<title>📺 Canali Italia</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --card: #1a1a26;
    --card-hover: #22223a;
    --border: rgba(255,255,255,0.07);
    --accent: #e8372a;
    --accent2: #ff6b35;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --green: #22c55e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; min-height:100vh; }

  header {
    background: linear-gradient(135deg,#0e0e16,#14141f);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex; align-items: center; justify-content: space-between;
    position: sticky; top:0; z-index:100;
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon { width:38px;height:38px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px; }
  .logo h1 { font-family:'Bebas Neue',cursive;font-size:24px;letter-spacing:3px;background:linear-gradient(135deg,#fff 30%,var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }
  .count-badge { background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:13px;color:var(--muted); }
  .count-badge strong { color:var(--accent2);font-family:'Bebas Neue',cursive;font-size:16px;letter-spacing:1px;margin-right:4px; }

  .controls {
    padding:10px 28px; display:flex; gap:10px; align-items:center; flex-wrap:nowrap; overflow:hidden;
    background:var(--bg); border-bottom:1px solid var(--border);
    position:sticky; top:67px; z-index:99;
  }
  .search-wrap { position:relative; flex:0 0 auto; width:200px; }
  .search-wrap svg { position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none; }
  input[type="text"] { width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);padding:10px 12px 10px 38px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;transition:border-color .2s; }
  input[type="text"]:focus { border-color:var(--accent); }

  .grid {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(130px,1fr));
    gap:10px;
    padding:20px 28px 48px;
  }

  .channel-card {
    background:var(--card);border:1px solid var(--border);border-radius:10px;
    overflow:hidden;cursor:pointer;transition:all .22s ease;
    text-decoration:none;color:inherit;display:flex;flex-direction:column;
    animation:fadeIn .3s ease both;
  }
  .channel-card:hover {
    background:var(--card-hover);border-color:rgba(232,55,42,.5);
    transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,0,0,.5),0 0 0 1px rgba(232,55,42,.2);
  }

  .logo-wrap {
    height:86px;display:flex;align-items:center;justify-content:center;
    padding:12px;background:#1e1e2e;position:relative;overflow:hidden;
  }
  .logo-wrap::before { content:'';position:absolute;inset:0;background:radial-gradient(circle at center,rgba(255,255,255,.04) 0%,transparent 70%);pointer-events:none; }
  .logo-wrap img { max-width:100%;max-height:58px;object-fit:contain;transition:transform .3s;display:block;position:relative;z-index:1; }
  .channel-card:hover .logo-wrap img { transform:scale(1.08); }

  .play-overlay {
    position:absolute;inset:0;background:rgba(232,55,42,.18);
    display:flex;align-items:center;justify-content:center;
    opacity:0;transition:opacity .2s;z-index:2;
  }
  .channel-card:hover .play-overlay { opacity:1; }
  .play-overlay svg { width:28px;height:28px;color:#fff;filter:drop-shadow(0 2px 8px rgba(0,0,0,.9)); }

  .no-logo {
    width:54px;height:54px;border-radius:50%;
    background:linear-gradient(135deg,#2a2a3e,#3a2a3e);
    display:flex;align-items:center;justify-content:center;
    font-family:'Bebas Neue',cursive;font-size:16px;color:var(--muted);
    letter-spacing:1px;border:1px solid var(--border);
  }

  .channel-info { padding:9px 10px 11px; }
  .channel-num { font-size:10px;font-weight:600;color:var(--accent2);letter-spacing:.5px;margin-bottom:3px; }
  .channel-name { font-size:12px;font-weight:600;color:var(--text);line-height:1.3;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
  .live-row { display:flex;align-items:center;gap:4px;margin-top:5px; }
  .live-dot { width:5px;height:5px;background:var(--green);border-radius:50%;animation:pulse 2s infinite;flex-shrink:0; }
  .live-label { font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .no-results { grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--muted); }
  .no-results p:first-child { font-size:15px;font-weight:600;margin-bottom:6px; }


  .filter-chips { display:flex; gap:6px; flex-wrap:nowrap; flex:1; overflow-x:auto; scrollbar-width:none; }
  .filter-chips::-webkit-scrollbar { display:none; }
  .chips-arrow {
    flex:0 0 auto; background:var(--card); border:1px solid var(--border);
    color:var(--muted); width:26px; height:26px; border-radius:50%;
    cursor:pointer; font-size:18px; line-height:1; display:flex; align-items:center; justify-content:center;
    transition:all .2s; padding:0;
  }
  .chips-arrow:hover { border-color:var(--accent2); color:var(--accent2); }
  .chip {
    background: var(--card); border: 1px solid var(--border);
    color: var(--muted); border-radius: 20px; padding: 5px 14px;
    font-size: 12px; cursor: pointer; transition: all .2s; white-space: nowrap;
    font-family:'DM Sans',sans-serif; line-height:1;
  }
  .chip:hover { border-color: var(--accent2); color: var(--accent2); }
  .chip.active { background: rgba(232,55,42,.15); border-color: var(--accent2); color: var(--accent2); }
  .channel-group-label { font-size:10px; color:var(--muted); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  footer { border-top:1px solid var(--border);padding:20px 28px;text-align:center;color:var(--muted);font-size:12px; }

  @media(max-width:600px){
    header,.controls{padding:12px 14px;}
    .grid{padding:12px 14px 30px;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
    .logo h1{font-size:20px;}
    .controls{top:61px;}
  }
</style>

function scrollChips(dir) {
  document.getElementById('chips').scrollBy({ left: dir * 200, behavior: 'smooth' });
}

function initials(n){ return n.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase(); }

function render(){
  const q = document.getElementById('search').value.toLowerCase().trim();
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  let list = channels;
  if (activeGroup !== 'Tutti') list = list.filter(c => c.group === activeGroup);
  if (q) list = list.filter(c => c.name.toLowerCase().includes(q) || c.num.includes(q));
  // shadow list for count - use filtered before text search for group badge
  const listForCount = list;
  document.getElementById('visible-count').textContent = list.length;

  if(!list.length){
    grid.innerHTML='<div class="no-results"><p>Nessun canale trovato</p><p>Prova con un altro termine</p></div>';
    return;
  }

  list.forEach((ch, i) => {
    const a = document.createElement('a');
    a.className = 'channel-card';
    a.href = ch.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.animationDelay = Math.min(i*0.012, 0.5)+'s';

    const safeN = ch.name.replace(/\\/g,'\\\\').replace(/'/g,"\\'");

    a.innerHTML = `
      <div class="logo-wrap">
        ${ch.logo
          ? `<img src="${ch.logo}" alt="${ch.name}" loading="lazy" onerror="this.onerror=null;this.parentNode.innerHTML='<div class=\\'no-logo\\'>${initials(ch.name)}</div><div class=\\'play-overlay\\'><svg viewBox=\\'0 0 24 24\\' fill=\\'currentColor\\'><path d=\\'M8 5v14l11-7z\\'/></svg></div>'">`
          : `<div class="no-logo">${initials(ch.name)}</div>`
        }
        <div class="play-overlay">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="channel-info">
        <div class="channel-num">${ch.num}</div>
        <div class="channel-name">${ch.name}</div>

        <div class="live-row"><span class="live-dot"></span><span class="live-label">LIVE</span></div>
      </div>`;
    grid.appendChild(a);
  });
}


// Build filter chips
const allGroups = ['Tutti', ...new Set(channels.map(c => c.group).filter(Boolean))];
let activeGroup = 'Tutti';
(function buildChips(){
  const el = document.getElementById('chips');
  allGroups.forEach(g => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (g === 'Tutti' ? ' active' : '');
    btn.textContent = g;
    btn.onclick = () => {
      activeGroup = g;
      document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    el.appendChild(btn);
  });
})();

render();
</script>
